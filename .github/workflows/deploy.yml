name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/client && git pull origin master 2>/dev/null || (cd ~ && git clone https://github.com/kampfz/DY-Portal.git temp-deploy && cp -r temp-deploy/client/* ~/client/ && rm -rf temp-deploy)
            echo "Deployed at $(date)"
