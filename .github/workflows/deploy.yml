name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~ && rm -rf temp-deploy
            git clone https://github.com/DE-YAN-Studio/DY-Portal.git temp-deploy
            cp -r temp-deploy/client/* ~/client/
            cp -r temp-deploy/server/* ~/server/
            cd ~/server && npm install
            pm2 restart portal-server
            rm -rf ~/temp-deploy
            echo "Deployed at $(date)"
